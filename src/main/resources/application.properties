server.error.include-message=always
server.error.include-binding-errors=always

# ── Database (Supabase PostgreSQL) ──────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/amigoscode}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── HikariCP connection pool (safe local defaults) ──────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# ── Redis ────────────────────────────────────────────────────────────────────
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=2000ms
spring.redis.connect-timeout=2000ms
# ── Cache ────────────────────────────────────────────────────────────────────
spring.cache.type=redis

# ── Disable Redis health check so Redis downtime doesn't kill app health ─────
management.health.redis.enabled=false

# ── CORS (externalized — override per environment) ───────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ── Pagination defaults (LF-203 safety net) ──────────────────────────────────
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# ── External Government API (minimum wage) ───────────────────────────────────
app.government.api.base-url=${GOVT_API_URL:https://api.labour.gov.in/minimum-wage}
app.government.api.timeout-ms=${GOVT_API_TIMEOUT_MS:5000}
