# ── Staging profile: Supabase + tuned HikariCP ──────────────────────────────
#
# Use the Supabase CONNECTION POOLER URL (port 6543 with PgBouncer), NOT the
# direct connection (port 5432). Direct connections are limited and will exhaust
# under load. PgBouncer multiplexes connections server-side.
#
# Format: jdbc:postgresql://db.{PROJECT_REF}.supabase.co:6543/postgres?pgbouncer=true&sslmode=require
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# ── HikariCP tuned for Supabase PgBouncer ───────────────────────────────────
# max-lifetime must be LESS than Supabase's idle connection timeout (typically 300s).
# keepalive-time sends a heartbeat to prevent the server from dropping idle connections.
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=240000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── Redis (staging) ──────────────────────────────────────────────────────────
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}

# ── CORS (staging frontend URL) ──────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:https://your-staging-frontend.com}

# ── External Government API ──────────────────────────────────────────────────
app.government.api.base-url=${GOVT_API_URL:https://api.labour.gov.in/minimum-wage}
app.government.api.timeout-ms=5000
